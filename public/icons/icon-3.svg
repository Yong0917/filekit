<!-- 3: 밝은 슬레이트 배경 + 파일 스택(여러개) → 단일 파일 (병합/변환 개념) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="114" fill="#F1F5F9"/>

  <!-- 왼쪽 파일 스택 (3장) -->
