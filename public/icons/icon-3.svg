  <rect x="56" y="184" width="140" height="172" rx="16" fill="#CBD5E1" transform="rotate(-10 126 270)"/>
  <!-- 뒤 1 -->
  <rect x="64" y="172" width="140" height="172" rx="16" fill="#94A3B8" transform="rotate(-4 134 258)"/>
