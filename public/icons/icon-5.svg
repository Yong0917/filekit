<!-- 5: 퍼플-인디고 그라디언트 + 파일 + 화살표 회전 (변환 에너지감) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="file5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg5)"/>

  <!-- 왼쪽 파일 (반투명) -->
  <rect x="52" y="156" width="148" height="188" rx="18" fill="white" opacity="0.2"/>
  <path d="M168 156 L200 188 L168 188 Z" fill="white" opacity="0.35"/>
  <rect x="72" y="272" width="108" height="10" rx="5" fill="white" opacity="0.25"/>
  <rect x="72" y="290" width="76" height="10" rx="5" fill="white" opacity="0.18"/>

  <!-- 오른쪽 파일 (선명한 흰색) -->
  <rect x="312" y="168" width="148" height="188" rx="18" fill="url(#file5)"/>
  <path d="M428 168 L460 200 L428 200 Z" fill="#DDD6FE"/>
  <rect x="332" y="284" width="108" height="10" rx="5" fill="#C4B5FD"/>
  <rect x="332" y="302" width="76" height="10" rx="5" fill="#C4B5FD"/>

  <!-- 중앙 원형 화살표 (sync/convert) -->
