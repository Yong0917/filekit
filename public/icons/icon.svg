  <rect x="80" y="286" width="76" height="10" rx="5" fill="white" opacity="0.2"/>

  <!-- 오른쪽 파일 (흰색 solid) -->
  <rect x="300" y="168" width="156" height="196" rx="20" fill="white"/>
  <path d="M422 168 L456 202 L422 202 Z" fill="#DBEAFE"/>
  <rect x="324" y="288" width="108" height="10" rx="5" fill="#BFDBFE"/>
